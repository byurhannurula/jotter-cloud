name: CI

# Develop on `dev`; `main` is the deploy branch (Cloudflare Workers Builds ships
# `main`). CI runs the same gates on both so nothing lands on `main` unchecked.
on:
  push:
    branches: [main, dev]
  pull_request:

# On rapid pushes to the same branch/PR, cancel the superseded run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast static gates. Kept separate so a flaky wrangler boot in the smoke job
  # can never red-flag a clean typecheck/lint/format.
  static:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check

  # Route smoke test: boots a local `wrangler dev` (miniflare R2 + D1) and asserts
  # every route's status. Needs no secrets — the test provides its own token.
  smoke:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
